<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nuvante Clearing Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F0F2F5;
      --surface:    #FFFFFF;
      --border:     #E4E7EE;
      --teal:       #0BBFB2;
      --teal-light: #E6FAF8;
      --teal-dark:  #089C91;
      --amber:      #F59E0B;
      --amber-light:#FEF3C7;
      --red:        #EF4444;
      --red-light:  #FEE2E2;
      --green:      #10B981;
      --green-light:#D1FAE5;
      --blue:       #3B82F6;
      --blue-light: #DBEAFE;
      --purple:     #8B5CF6;
      --purple-light:#EDE9FE;
      --text-primary:   #111827;
      --text-secondary: #6B7280;
      --text-muted:     #9CA3AF;
      --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
      --shadow-md:  0 4px 12px rgba(0,0,0,.08);
      --radius-sm:  8px;
      --radius-md:  12px;
      --radius-lg:  16px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Sidebar ── */
    .sidebar {
      position: fixed; top: 0; left: 0;
      width: 220px; height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo .logo-mark {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      background: var(--teal);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-text { font-weight: 700; font-size: 15px; color: var(--text-primary); }
    .logo-sub  { font-size: 10px; color: var(--text-muted); letter-spacing: .5px; text-transform: uppercase; margin-top: 1px; }
    .sidebar-role {
      margin: 12px 16px 0;
      padding: 8px 10px;
      background: var(--teal-light);
      border-radius: var(--radius-sm);
      font-size: 11px; color: var(--teal-dark); font-weight: 600;
      display: flex; align-items: center; gap: 6px;
    }
    .sidebar-nav { padding: 8px 0; flex: 1; overflow-y: auto; }
    .nav-section { padding: 16px 16px 4px; font-size: 10px; color: var(--text-muted); font-weight: 600; letter-spacing: .8px; text-transform: uppercase; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 0;
      transition: all .15s;
      font-size: 13px; font-weight: 500;
      border-left: 3px solid transparent;
      position: relative;
    }
    .nav-item:hover { background: var(--bg); color: var(--text-primary); }
    .nav-item.active { background: var(--teal-light); color: var(--teal-dark); border-left-color: var(--teal); }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--red);
      color: #fff; font-size: 10px; font-weight: 600;
      padding: 1px 6px; border-radius: 10px; line-height: 1.6;
    }
    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }
    .user-info {
      display: flex; align-items: center; gap: 10px;
    }
    .user-avatar {
      width: 32px; height: 32px;
      background: var(--teal);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 12px;
    }
    .user-name  { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .user-role  { font-size: 11px; color: var(--text-muted); }

    /* ── Main Layout ── */
    .main {
      margin-left: 220px;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }
    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .topbar-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .topbar-search {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      font-size: 13px; color: var(--text-muted);
      width: 220px;
    }
    .topbar-search input {
      border: none; background: none; outline: none;
      font-size: 13px; color: var(--text-primary); width: 100%;
    }
    .topbar-search input::placeholder { color: var(--text-muted); }
    .icon-btn {
      width: 36px; height: 36px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all .15s;
      color: var(--text-secondary);
    }
    .icon-btn:hover { background: var(--border); }
    .notif-dot { position: relative; }
    .notif-dot::after {
      content: '';
      position: absolute; top: 6px; right: 6px;
      width: 7px; height: 7px;
      background: var(--red);
      border-radius: 50%;
      border: 1px solid var(--surface);
    }

    .content { padding: 24px; flex: 1; }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
    }
    .card-header {
      padding: 16px 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .card-title {
      font-size: 14px; font-weight: 700; color: var(--text-primary);
      display: flex; align-items: center; gap: 8px;
    }
    .card-body { padding: 16px 20px; }

    /* ── Stat Cards ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: 18px 20px;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; color: var(--text-primary); line-height: 1; }
    .stat-sub   { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
    .stat-delta { font-size: 11px; font-weight: 600; margin-top: 5px; }
    .delta-up   { color: var(--green); }
    .delta-down { color: var(--red); }
    .stat-icon  {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── Grid Layouts ── */
    .grid-2-3 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .grid-3-2 { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; }
    .tab {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 12px; font-weight: 500;
      cursor: pointer;
      transition: all .15s;
      border: 1px solid transparent;
      color: var(--text-secondary);
    }
    .tab:hover { background: var(--bg); }
    .tab.active {
      background: var(--teal);
      color: #fff;
      border-color: var(--teal);
    }

    /* ── Status Badges ── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px; font-weight: 600;
      letter-spacing: .3px;
      text-transform: uppercase;
    }
    .badge-teal    { background: var(--teal-light);   color: var(--teal-dark); }
    .badge-green   { background: var(--green-light);  color: #065F46; }
    .badge-amber   { background: var(--amber-light);  color: #92400E; }
    .badge-red     { background: var(--red-light);    color: #991B1B; }
    .badge-blue    { background: var(--blue-light);   color: #1E40AF; }
    .badge-purple  { background: var(--purple-light); color: #5B21B6; }
    .badge-gray    { background: #F3F4F6;              color: #374151; }
    .badge-dot::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      margin-right: 5px;
      display: inline-block;
    }

    /* ── Transaction List ── */
    .txn-list { display: flex; flex-direction: column; }
    .txn-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .1s;
    }
    .txn-item:last-child { border-bottom: none; }
    .txn-item:hover { background: var(--bg); margin: 0 -20px; padding-left: 20px; padding-right: 20px; border-radius: 4px; }
    .txn-icon-wrap {
      width: 36px; height: 36px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .txn-info { flex: 1; min-width: 0; }
    .txn-pair  { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .txn-meta  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .txn-right { text-align: right; flex-shrink: 0; }
    .txn-scenario { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
    .txn-arrow { color: var(--text-muted); font-size: 12px; flex-shrink: 0; }

    /* ── RTGS Accounts ── */
    .rtgs-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .rtgs-item:last-child { border-bottom: none; }
    .rtgs-name  { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .rtgs-acct  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .rtgs-amount{ font-size: 14px; font-weight: 700; color: var(--text-primary); text-align: right; }

    /* ── Activity Feed ── */
    .activity-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .activity-text { font-size: 12px; color: var(--text-primary); line-height: 1.5; flex: 1; }
    .activity-time { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 10px 16px;
      text-align: left;
      font-size: 11px; font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .5px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 11px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #FAFAFA; cursor: pointer; }
    .id-code { font-family: 'Fira Code', monospace; font-size: 12px; color: var(--teal-dark); }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      border: none; outline: none;
      transition: all .15s;
      text-decoration: none;
    }
    .btn-primary  { background: var(--teal);  color: #fff; }
    .btn-primary:hover  { background: var(--teal-dark); }
    .btn-secondary{ background: var(--bg); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover{ background: var(--border); }
    .btn-danger   { background: var(--red-light); color: var(--red); border: 1px solid #FCA5A5; }
    .btn-danger:hover   { background: #FECACA; }
    .btn-sm  { padding: 5px 12px; font-size: 12px; }
    .btn-ghost{ background: transparent; color: var(--text-secondary); border: 1px solid transparent; }
    .btn-ghost:hover{ background: var(--bg); color: var(--text-primary); }

    /* ── Form Elements ── */
    .form-row { display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap; }
    .form-group { display: flex; flex-direction: column; gap: 5px; min-width: 120px; }
    .form-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .4px; }
    .form-control {
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 13px; color: var(--text-primary);
      background: var(--surface);
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    .form-control:focus { border-color: var(--teal); }
    select.form-control { cursor: pointer; }

    /* ── Timeline ── */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .tl-step {
      display: flex; align-items: flex-start; gap: 14px;
      padding-bottom: 20px;
      position: relative;
    }
    .tl-step:last-child { padding-bottom: 0; }
    .tl-dot-wrap { display: flex; flex-direction: column; align-items: center; }
    .tl-dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
    }
    .tl-line {
      width: 2px; flex: 1;
      background: var(--border);
      min-height: 24px;
      margin-top: 4px;
    }
    .tl-step.done .tl-dot { background: var(--green-light); color: var(--green); }
    .tl-step.active .tl-dot { background: var(--teal-light); color: var(--teal); box-shadow: 0 0 0 4px var(--teal-light); }
    .tl-step.pending .tl-dot { background: var(--bg); color: var(--text-muted); border: 2px solid var(--border); }
    .tl-step.failed .tl-dot { background: var(--red-light); color: var(--red); }
    .tl-content { padding-top: 4px; }
    .tl-title { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .tl-desc  { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .tl-time  { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

    /* ── Page System ── */
    .page { display: none; }
    .page.active { display: block; }

    /* ── Scrollable Panels ── */
    .scroll-panel { overflow-y: auto; max-height: 340px; }

    /* ── Empty State ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 40px 20px;
      color: var(--text-muted);
      text-align: center;
    }
    .empty-state svg { margin-bottom: 12px; opacity: .4; }
    .empty-state p { font-size: 13px; }

    /* ── Detail View Overlay ── */
    .detail-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.35);
      z-index: 200;
      justify-content: flex-end;
    }
    .detail-overlay.open { display: flex; }
    .detail-panel {
      width: 480px;
      background: var(--surface);
      height: 100%;
      overflow-y: auto;
      box-shadow: -8px 0 32px rgba(0,0,0,.12);
      display: flex; flex-direction: column;
    }
    .detail-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; background: var(--surface); z-index: 1;
    }
    .detail-body { padding: 20px 24px; flex: 1; }
    .close-btn {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: var(--bg);
      color: var(--text-secondary); transition: all .15s;
      border: 1px solid var(--border);
    }
    .close-btn:hover { background: var(--border); }
    .meta-row {
      display: flex; justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .meta-row:last-child { border-bottom: none; }
    .meta-label { color: var(--text-secondary); font-weight: 500; }
    .meta-value { color: var(--text-primary); font-weight: 600; }

    /* ── Alert Banner ── */
    .alert {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px; margin-bottom: 16px;
    }
    .alert-warning { background: var(--amber-light); color: #92400E; border: 1px solid #FCD34D; }
    .alert-error   { background: var(--red-light);   color: #991B1B; border: 1px solid #FCA5A5; }
    .alert-info    { background: var(--blue-light);  color: #1E40AF; border: 1px solid #93C5FD; }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); margin: 16px 0; }
    .section-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px; }

    /* ── Responsive ── */
    @media (max-width: 1200px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 900px) {
      .sidebar { width: 60px; }
      .sidebar .logo-text, .sidebar .logo-sub, .sidebar-role, .nav-item span, .sidebar-footer .user-name, .sidebar-footer .user-role, .nav-section { display: none; }
      .main { margin-left: 60px; }
      .grid-3-2, .grid-2-3 { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) {
      .stats-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
      .main { margin-left: 0; }
    }

    /* ── Role Switcher (demo only) ── */
    .role-switcher {
      display: flex; gap: 6px;
      padding: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }
    .role-btn {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; border: none;
      color: var(--text-secondary);
      background: transparent;
      transition: all .15s;
    }
    .role-btn:hover { background: var(--border); }
    .role-btn.active { background: var(--teal); color: #fff; }

    /* ── Misc ── */
    .flex     { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .mb-1  { margin-bottom: 4px; }
    .mb-2  { margin-bottom: 8px; }
    .mb-3  { margin-bottom: 12px; }
    .mb-4  { margin-bottom: 16px; }
    .mb-5  { margin-bottom: 20px; }
    .text-sm { font-size: 12px; }
    .text-xs { font-size: 11px; }
    .font-bold { font-weight: 700; }
    .font-semibold { font-weight: 600; }
    .text-muted { color: var(--text-muted); }
    .text-teal  { color: var(--teal-dark); }
    .text-red   { color: var(--red); }
    .text-green { color: var(--green); }
    .text-amber { color: var(--amber); }

    /* ── Pulse animation for active ── */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .5; }
    }
    .pulse { animation: pulse 2s infinite; }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     MAIN WRAPPER
═══════════════════════════════════════════ -->
<div class="main">

  <!-- Top Bar -->

/* ───── SWAP ICON ───── */
function swapIcon(color, bg) {
  return `<div class="txn-icon-wrap" style="background:${bg}">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round">

      <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
    </svg>
  </div>`;
}

function txnSwapIcon(status) {
  const map = {
    'Earmarked': ['#F59E0B','#FEF3C7'],
    'Settled':   ['#10B981','#D1FAE5'],
    'Exception': ['#EF4444','#FEE2E2'],
    'Queued':    ['#3B82F6','#DBEAFE'],
    'Locked':    ['#8B5CF6','#EDE9FE'],
  };
  const [c, b] = map[status] || ['#9CA3AF','#F3F4F6'];
  return swapIcon(c, b);
}

/* ───── RENDER SIDEBAR ───── */
function renderSidebar(role) {
  const cfg = ROLE_CONFIG[role];
  document.getElementById('role-label').textContent = cfg.label;
  document.getElementById('user-avatar').textContent = cfg.avatar;
  document.getElementById('user-name').textContent = cfg.name;
  document.getElementById('user-role-sub').textContent = cfg.sub;

  const nav = document.getElementById('sidebar-nav');
  const sections = { admin:['MONITORING','MANAGEMENT'], member:['TRADING','ACCOUNT'], issuer:['OVERVIEW','MODEL 2'] };
  let html = '';
  cfg.nav.forEach((item, i) => {
    if (i % 2 === 0 && sections[role]) {
      const sIdx = Math.floor(i / 2);
      if (sections[role][sIdx]) html += `<div class="nav-section">${sections[role][sIdx]}</div>`;
    }
    const active = item.page === activeNavPage ? 'active' : '';
    const badge  = item.badge ? `<span class="nav-badge">${item.badge}</span>` : '';
    html += `<div class="nav-item ${active}" onclick="navigateTo('${item.page}')">
      ${item.icon}<span>${item.label}</span>${badge}
    </div>`;
  });
  nav.innerHTML = html;
}

/* ───── SWITCH ROLE ───── */
function switchRole(role) {
  currentRole = role;
  ['admin','member','issuer'].forEach(r => {
    document.getElementById(`btn-${r}`).classList.toggle('active', r === role);
  });
  const defaultPages = { admin:'admin-overview', member:'member-overview', issuer:'issuer-overview' };
  activeNavPage = defaultPages[role];
  document.getElementById('topbar-title').textContent = ROLE_CONFIG[role].title;
  renderSidebar(role);
  renderPage(activeNavPage);
}

function navigateTo(page) {
  activeNavPage = page;
  renderSidebar(currentRole);
  renderPage(page);
}

/* ───── RENDER PAGES ───── */
function renderPage(page) {
  const content = document.getElementById('main-content');
  const pages = {
    'admin-overview': renderAdminOverview,
    'admin-txns':     renderAdminTxns,
    'admin-audit':    renderAdminAudit,
    'admin-queue':    renderAdminQueue,
    'admin-rtgs':     renderAdminRTGS,
    'admin-config':   renderAdminConfig,
    'member-overview':renderMemberOverview,
    'member-new':     renderMemberNew,
    'member-txns':    renderMemberTxns,
    'member-balances':renderMemberBalances,
    'issuer-overview':renderIssuerOverview,
    'issuer-supply':  renderIssuerSupply,
    'issuer-txns':    renderIssuerTxns,
    'issuer-model2':  renderIssuerModel2,
  };
  const fn = pages[page] || (() => `<p style="padding:24px;color:var(--text-muted)">Page coming soon…</p>`);
  content.innerHTML = fn();
}

        <div class="card-body">
          <p class="text-sm text-muted mb-3">Transactions requiring issuer participation in settlement</p>
          <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="navigateTo('issuer-model2')">
            Review Pending Actions →

  </div>`;
}

/* ═══════ DETAIL PANEL ═══════ */
function openDetail(id) {
  const t = TRANSACTIONS.find(x => x.id === id);
  if (!t) return;
  document.getElementById('detail-id').textContent = t.id;
  document.getElementById('detail-type').textContent = t.type;

  const steps = [
    { label:'Received', desc:'Instruction received and validated', time:t.created, state:'done' },
    { label:'Queued', desc:'Added to clearing queue', time:t.created, state: ['Queued','Locked','Earmarked','Settled'].includes(t.status) ? 'done' : 'pending' },
    { label:'Locked', desc:'Inbound stablecoin locked', time:t.updated, state: ['Locked','Earmarked','Settled'].includes(t.status) ? 'done' : t.status==='Queued' ? 'pending' : t.status==='Exception' ? 'failed' : 'pending' },
    { label:'Earmarked', desc:'RTGS earmark requested and confirmed', time:t.updated, state: ['Earmarked'].includes(t.status) ? 'active' : t.status==='Settled' ? 'done' : t.status==='Exception' ? 'failed' : 'pending' },
    { label:'Burn / Mint', desc:'Stablecoin burn/mint simulation', time:t.updated, state: t.status==='Settled' ? 'done' : 'pending' },
    { label:t.status==='Settled' ? 'Settled' : 'Settlement Pending', desc:'Final RTGS settlement', time:t.status==='Settled'?t.updated:'–', state: t.status==='Settled' ? 'done' : t.status==='Exception' ? 'failed' : 'pending' },
  ];

  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <div class="mb-4">
      <div class="flex items-center justify-between mb-2">
        <div class="section-title" style="margin:0">Status</div>
        ${statusBadge(t.status)}
      </div>
    </div>

    <div class="card mb-4" style="border-color:var(--border)">
      <div class="card-body" style="padding:12px 16px">
        ${[
          ['Type',    t.type],
          ['Pair',    `<strong>${t.pair}</strong>`],
          ['Amount',  `<strong>${t.amount}</strong>`],
          ['Member',  t.member],
          ['Scenario',t.scenario],
          ['Created', t.created],
          ['Updated', t.updated],
          ['Cancellable', t.cancellable ? '<span style="color:var(--teal-dark)">Yes</span>' : '<span style="color:var(--text-muted)">No</span>'],
        ].map(([k,v]) => `
        <div class="meta-row">
          <span class="meta-label">${k}</span>
          <span class="meta-value">${v}</span>
        </div>`).join('')}
      </div>
    </div>

    <div class="section-title">Transaction Timeline</div>
    <div class="timeline">
      ${steps.map((s, i) => `
      <div class="tl-step ${s.state}">
        <div class="tl-dot-wrap">
          <div class="tl-dot">
            ${s.state==='done'    ? checkIcon() : ''}
            ${s.state==='active'  ? '<div style="width:8px;height:8px;border-radius:50%;background:var(--teal)"></div>' : ''}
            ${s.state==='failed'  ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>' : ''}
            ${s.state==='pending' ? '<div style="width:8px;height:8px;border-radius:50%;background:var(--border)"></div>' : ''}
          </div>
          ${i < steps.length - 1 ? `<div class="tl-line"></div>` : ''}
        </div>
        <div class="tl-content">
          <div class="tl-title">${s.label}</div>
          <div class="tl-desc">${s.desc}</div>
          <div class="tl-time">${s.time}</div>
        </div>
      </div>`).join('')}
    </div>

    ${t.status === 'Exception' ? `
    <div class="divider"></div>
    <div class="section-title">Exception Details</div>
    <div class="alert alert-error">
      ${warningIcon()}
      <div>
        <div style="font-weight:600;margin-bottom:4px">RTGS Liquidity Failure</div>
        <div class="text-sm">No available RTGS liquidity for £500,000.00. Settlement rejected by BoE Lab. Earmark cancelled and asset lock released.</div>
      </div>
    </div>` : ''}

    ${t.cancellable ? `
    <div class="divider"></div>
    <button class="btn btn-danger" style="width:100%;justify-content:center">Cancel Transaction</button>
    <div class="text-xs text-muted" style="margin-top:8px;text-align:center">This will release the earmark and unlock locked assets</div>
    ` : `
    <div class="divider"></div>
    <div class="text-sm text-muted" style="text-align:center;padding:8px">Transaction is ${t.status.toLowerCase()} — no further actions available</div>
    `}
  `;
  document.getElementById('detail-overlay').classList.add('open');
}

function closeDetail(e) {
  if (!e || e.target === document.getElementById('detail-overlay')) {
    document.getElementById('detail-overlay').classList.remove('open');
  }
}

/* ═══════ INIT ═══════ */
switchRole('admin');

/* ── Tab click handler ── */
document.addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (tab) {
    const group = tab.closest('.tabs');
    if (group) {
      group.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
    }
  }
});
</script>
